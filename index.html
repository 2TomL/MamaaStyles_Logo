<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mamaa Styles Logo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: #1a002a; }
  </style>
  <link rel="icon" type="image/png" href="assets/mama full.png">
</head>
<body>
  <svg id="svg-filters">
    <defs>
      <filter id="water-distortion" x="-20%" y="-20%" width="140%" height="140%">
        <feTurbulence id="turbulence" baseFrequency="0.015 0.01" numOctaves="2" result="noise" />
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="8" />
      </filter>
        <!-- Electro-glow filter for ring -->
        <filter id="electro-glow" x="-20%" y="-20%" width="140%" height="140%">
          <feTurbulence id="turb" type="turbulence" baseFrequency="0.03" numOctaves="2" seed="2" result="turb"/>
          <feDisplacementMap in2="turb" in="SourceGraphic" scale="20" xChannelSelector="R" yChannelSelector="G"/>
          <feGaussianBlur stdDeviation="2" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
    </defs>
  </svg>

  <div class="loader" id="loader">
    <div class="progress-percentage" id="progress-percentage">0%</div>
    <div class="progress-container">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="loading-text">Loading a beautiful experience for the Mamaa Styles <br>trust no jokes!</div>
  </div>

  <main class="hero" id="hero">
      <div class="hero__content">
        <!-- Titel verwijderd -->
      </div>
  </main>

  <!-- Logo animatie -->
  <div id="logo-shield-border"></div>
  <!-- replaced with new image including spaces in filename -->
  <img id="logo-shield" src="assets/Remove background project.png" alt="Logo" />

  <script type="module" src="main.js"></script>
</body>

<div class="nio-twitch"><a href="https://www.twitch.tv/mamaastyles" target="_blank" rel="noopener">twitch.tv/mamaastyles</a></div>
<div class="mikey-credit">made by Mikey</div>
</html>
</body>
</html>
